name: Déploiement GitHub Pages

# Build Vite + déploiement sur GitHub Pages à chaque push sur main
# (ou manuellement via l'onglet Actions → « Run workflow »).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Chemin GitHub Pages = /<nom-du-depot>/
          BASE_PATH: /${{ github.event.repository.name }}/
          # Clés à définir dans Settings > Secrets and variables > Actions
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Téléverser l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
